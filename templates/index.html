{% extends "layout.html" %}

{% block title %}
    Home
{% endblock %}

{% block body %}

<div class="container mt-5">
    <div class="card shadow-sm p-4">
        <h2 class="mb-4 text-center">Personalize any landing page for your ad</h2>

        <form action="/generate" method="post">

            <div class="mb-3">
                <label class="form-label"><strong>Ad Creative</strong></label>
                <textarea 
                    class="form-control" 
                    name="ad_text" 
                    rows="4" 
                    placeholder="Enter ad text..." 
                    required>
                </textarea>
            </div>

            <div class="mb-3">
                <label class="form-label"><strong>Landing Page URL</strong></label>
                <input 
                    class="form-control"
                    name="url" 
                    type="url" 
                    placeholder="https://example.com" 
                    required>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-primary px-4">
                    Generate
                </button>
            </div>

        </form>
    </div>
</div>

{% endblock %}
